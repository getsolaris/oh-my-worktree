name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Run tests
        run: bun test
      - name: Build
        run: bun run scripts/build.ts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/omw.js
          generate_release_notes: true
      - name: Update Homebrew Formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REVISION="${GITHUB_SHA}"
          git clone https://x-access-token:${TAP_TOKEN}@github.com/getsolaris/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i "s/tag:.*\"v[^\"]*\"/tag:      \"${TAG}\"/" Formula/oh-my-worktree.rb
          sed -i "s/revision: \"[^\"]*\"/revision: \"${REVISION}\"/" Formula/oh-my-worktree.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/oh-my-worktree.rb
          git commit -m "update oh-my-worktree to ${TAG}" || exit 0
          git push
